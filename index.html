<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ResenIA - Copa do Mundo 2026</title>
    <!-- Corrige o erro 404 do Favicon adicionando um emoji de bola de futebol -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
    
    <!-- API OFICIAL DO YOUTUBE -->
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <!-- MARKDOWN PARSER -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- FUSE.JS (Mecanismo de Busca Semântica/Aproximada Local) -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
    
    <!-- VARIÁVEIS DE AMBIENTE -->
    <script src="env.js"></script>
    
    <style>
        /* ==========================================================================
           FONTES DA COPA DO MUNDO 2026 E GOOGLE (GEMINI)
           ========================================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap');

        @font-face {
            font-family: 'FWC2026-Condensed';
            src: url('./fonts/FWC2026-CondensedLight.ttf') format('truetype');
            font-weight: 200;
            font-display: swap;
        }

        @font-face {
            font-family: 'FWC2026-Expanded';
            src: url('./fonts/FWC2026-ExpandedBlack.ttf') format('truetype');
            font-weight: 200;
            font-display: swap;
        }

        /* ==========================================================================
           ESTILOS GERAIS DA INTERFACE (TEMA GEMINI / W3LABS)
           ========================================================================== */
        :root {
            --bg-dark: #131314;
            --bg-panel: rgba(30, 31, 34, 0.75);
            --primary: #8b5cf6;
            --secondary: #10b981;
            --text-main: #e3e3e3;
            --espn-red: #dd0000;
            --bg-image: url('https://i.makeagif.com/media/12-30-2025/IEbxhX.gif');
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Google Sans', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* BLOQUEIO DE SCROLL GLOBAL PARA TELA FIXA (PC E MOBILE) E BACKGROUND GRADIENTE */
        html,
        body {
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            overscroll-behavior: none;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #000;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            z-index: 0;
        }

        /* Camada da imagem de fundo com blur preto */
        body::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.25);
            z-index: -1;
        }

        /* HEADER */
        header {
            background: transparent;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            position: relative;
        }

        .logo-resenia {
            font-family: 'FWC2026-Expanded', 'Arial Black', sans-serif;
            font-size: 20px;
            background: -webkit-linear-gradient(#fff, #d4b561);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #toggle-feed-btn,
        #calendar-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #c4c7c5;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        #toggle-feed-btn:hover,
        #calendar-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .live-badge {
            background-color: rgba(221, 0, 0, 0.2);
            color: #ff4d4d;
            border: 1px solid rgba(221, 0, 0, 0.4);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            animation: pulse 2s infinite;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .live-badge::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #ff4d4d;
            border-radius: 50%;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* LAYOUT PRINCIPAL */
        .content-split {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
            justify-content: center;
            background: transparent;
        }

        /* CHAT DA IA */
        .chat-section {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            background: transparent;
            position: relative;
            margin: 0 auto;
        }

        .initial-greeting {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.2rem;
            color: #e3e3e3;
            text-align: center;
            font-weight: 400;
            width: 100%;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .chat-messages {
            flex: 1;
            padding: 30px 20px 130px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
            background: transparent;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 100%;
            font-size: 15px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease-out;
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-ai {
            background-color: transparent;
            color: var(--text-main);
            align-self: flex-start;
        }

        .msg-ai strong {
            color: #d4b561;
            font-family: 'Google Sans', sans-serif;
            font-size: 16px;
            margin-bottom: 5px;
            display: inline-block;
        }

        /* ESTILOS PARA MARKDOWN */
        .msg-ai h1, .msg-ai h2, .msg-ai h3, .msg-ai h4, .msg-ai h5, .msg-ai h6 {
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: normal;
            padding: 4px 8px;
            margin: 12px 0 8px 0;
            color: #d4b561;
        }

        .msg-ai p { margin-bottom: 10px; }
        .msg-ai blockquote { background: rgba(16, 185, 129, 0.1); border-left: 3px solid var(--secondary); font-style: italic; padding: 8px 12px; margin: 8px 0 8px 2px; }
        .msg-ai pre { background: rgba(0, 0, 0, 0.5); border-left: 3px solid var(--primary); padding: 10px; margin-left: 2px; overflow-x: auto; }
        .msg-ai code { background: rgba(0, 0, 0, 0.5); font-family: 'Courier New', Courier, monospace; font-size: 0.9em; padding: 2px 4px; border-radius: 4px; }
        .msg-ai table { border-spacing: 0px; border-right: 1px solid rgba(255, 255, 255, 0.1); border-bottom: 1px solid rgba(255, 255, 255, 0.1); width: 100%; margin: 10px 0; }
        .msg-ai th, .msg-ai td { border-left: 1px solid rgba(255, 255, 255, 0.1); border-top: 1px solid rgba(255, 255, 255, 0.1); padding: 8px; }
        .msg-ai th { background: rgba(255, 255, 255, 0.05); font-weight: 600; color: #d4b561; }
        .msg-ai ul { margin-left: 20px; margin-bottom: 10px; }
        .msg-ai ol { margin-left: 25px; margin-bottom: 10px; }

        .msg-user {
            background-color: #1e1f20;
            color: #e3e3e3;
            align-self: flex-end;
            padding: 15px 25px;
            border-radius: 25px;
            max-width: 80%;
        }

        /* BARRA DE INPUT */
        .chat-input-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 780px;
            padding: 0 20px;
            z-index: 100;
        }

        .chat-input-area {
            background: #1e1f20;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .chat-input-area:focus-within {
            background: #252628;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        .chat-input-area input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e3e3e3;
            font-size: 15px;
            outline: none;
            padding: 5px;
        }

        .chat-input-area input::placeholder { color: #a8a8a8; }

        .icon-btn {
            background: transparent;
            color: #c4c7c5;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 50%;
            transition: 0.2s;
        }

        .icon-btn:hover { color: #fff; background: rgba(255, 255, 255, 0.05); }

        /* FEED DA API LATERAL */
        .live-feed-section {
            flex: 1;
            background: rgba(19, 19, 20, 0.4);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            min-width: 320px;
            max-width: 380px;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 40;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .feed-header {
            padding: 18px 24px;
            background: transparent;
            font-family: 'FWC2026-Expanded', sans-serif;
            font-size: 13px;
            color: #d4b561;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .api-status {
            font-size: 10px;
            font-weight: bold;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 4px 8px;
            border-radius: 12px;
            color: var(--secondary);
            letter-spacing: 0.5px;
        }

        .feed-content {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .feed-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 14px;
            border-left: 3px solid var(--primary);
            border-radius: 8px;
            font-size: 13.5px;
            animation: slideInLeft 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .feed-item.real-api { border-left-color: #d4b561; }

        .feed-time {
            font-weight: bold;
            color: #a8a8a8;
            margin-right: 8px;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .typing-indicator { display: inline-block; width: 40px; }
        .typing-indicator span {
            display: inline-block; width: 6px; height: 6px; background-color: var(--primary); border-radius: 50%;
            animation: typing 1.4s infinite both; margin: 0 2px;
        }
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* WIDGETS */
        #placar-widget, #groups-widget, #lineups-widget, #match-list-widget { display: none; width: 100%; margin-top: 15px; border-radius: 16px; }
        
        #placar-widget {
            background-image: url('https://m.media-amazon.com/images/S/le-target-images-prod/amzn1.dv.gti.2adbf7b6-0e91-4be9-bfe2-6524729574e3/1/HERO-16X9/en-US._UR1920,1080_SX1080_FMjpg_.jpg');
            background-size: cover; background-position: center; border: 1px solid rgba(255, 255, 255, 0.1); overflow: hidden;
        }
        #placar-widget > .placar-container { background: rgba(19, 19, 20, 0.85); backdrop-filter: blur(6px); padding: 15px 0; }

        .placar-container { display: flex; flex-direction: column; align-items: center; position: relative; width: 100%; font-family: 'FWC2026-Condensed', 'Arial Black', sans-serif; }
        .placar-main { position: relative; width: 100%; max-width: 600px; display: flex; align-items: center; justify-content: space-between; z-index: 10; padding: 10px 0; }
        
        .barra-dourada {
            position: absolute; top: 50%; left: 0; right: 0; transform: translateY(-50%); height: 48px;
            background-image: url('https://m.media-amazon.com/images/S/le-target-images-prod/amzn1.dv.gti.2adbf7b6-0e91-4be9-bfe2-6524729574e3/1/HERO-16X9/en-US._UR1920,1080_SX1080_FMjpg_.jpg'); background-size: cover; background-position: center; border-radius: 8px; z-index: 1;
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.2), 0 3px 5px rgba(0, 0, 0, 0.6);
        }

        .time-card { position: relative; height: 50px; width: 160px; background: transparent; color: white; z-index: 3; display: flex; align-items: center; padding: 0 10px; }
        .home-card { border-radius: 25px; justify-content: flex-start; gap: 8px; margin-left: 10px; }
        .away-card { border-radius: 25px; justify-content: flex-end; gap: 8px; margin-right: 10px; }

        .bandeira { height: 32px; width: 48px; object-fit: cover; border-radius: 6px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5); }
        .nome-time { font-family: 'FWC2026-Expanded', 'Arial Black', sans-serif; font-size: 18px; font-weight: 900; letter-spacing: 1px; }
        .cards-slot { display: flex; gap: 3px; }

        .score-container { display: flex; align-items: center; justify-content: center; gap: 15px; z-index: 7; }
        .gol-texto { font-family: 'FWC2026-Expanded', 'Arial Black', sans-serif; font-size: 30px; font-weight: 900; color: #ffffff; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8); }

        .logo-central { width: 55px; height: 70px; display: flex; justify-content: center; align-items: center; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .logo-central img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.5)); }

        .tempo-container { margin-top: 15px; z-index: 15; position: relative; display: flex; justify-content: center; width: 100%; }
        .caixa-tempo {
            font-family: 'FWC2026-Expanded', 'Arial Black', sans-serif; background-image: url('https://m.media-amazon.com/images/S/le-target-images-prod/amzn1.dv.gti.2adbf7b6-0e91-4be9-bfe2-6524729574e3/1/HERO-16X9/en-US._UR1920,1080_SX1080_FMjpg_.jpg'); background-size: cover; background-position: center;
            color: white; font-size: 15px; font-weight: 900; padding: 4px 28px; border-radius: 20px; border: 2px solid rgba(255, 255, 255, 0.2); box-shadow: 0 5px 10px rgba(0, 0, 0, 0.6);
        }

        #placar-odds { margin-top: 15px; background: rgba(0, 0, 0, 0.6); padding: 4px 15px; border-radius: 12px; font-size: 11px; color: #fff; font-family: 'FWC2026-Expanded', sans-serif; display: flex; justify-content: center; gap: 15px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .match-meta-info { margin-top: 10px; background: rgba(0, 0, 0, 0.5); padding: 5px 15px; border-radius: 20px; font-size: 12px; color: #d4b561; font-family: 'FWC2026-Expanded', sans-serif; border: 1px solid rgba(212, 181, 97, 0.2); text-transform: uppercase; }

        .stoppage-time-anim {
            background: #eab308; color: #000; font-family: 'FWC2026-Expanded', sans-serif; font-size: 11px; font-weight: 900; padding: 4px 8px; border-radius: 4px; margin-left: 12px;
            animation: pulse-stoppage 1.5s infinite;
        }

        @keyframes pulse-stoppage {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 10px 4px rgba(234, 179, 8, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(234, 179, 8, 0); }
        }

        /* Match List Widget */
        #match-list-widget { background-color: rgba(19, 19, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); overflow: hidden; }
        .match-list-header { padding: 16px 20px; background: transparent; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-family: 'FWC2026-Expanded', 'Arial Black', sans-serif; color: #d4b561; text-align: center; font-size: 15px; }
        .match-list-container { max-height: 400px; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
        .match-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; background: rgba(255, 255, 255, 0.02); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.03); cursor: pointer; transition: all 0.2s; }
        .match-item:hover, .match-item.selected { background: rgba(139, 92, 246, 0.1); border-color: var(--primary); }
        .match-info { display: flex; flex-direction: column; gap: 6px; }
        .match-date { font-size: 12.5px; color: #a8a8a8; font-weight: 600; }
        .match-teams { display: flex; align-items: center; gap: 12px; font-family: 'FWC2026-Condensed', sans-serif; font-size: 16px; color: white; }
        .match-team-flag { width: 26px; height: 18px; border-radius: 3px; object-fit: cover; }
        .match-status { font-size: 12px; padding: 6px 10px; border-radius: 6px; font-weight: 800; text-align: center; min-width: 75px; letter-spacing: 0.5px; }
        .status-live { background-color: rgba(239, 68, 68, 0.15); color: var(--espn-red); border: 1px solid rgba(239, 68, 68, 0.3); animation: pulse 2s infinite; }
        .status-scheduled { background-color: rgba(255, 255, 255, 0.05); color: #a8a8a8; border: 1px solid rgba(255, 255, 255, 0.1); }
        .status-finished { background-color: rgba(16, 185, 129, 0.15); color: var(--secondary); border: 1px solid rgba(16, 185, 129, 0.3); }
        .match-score { font-family: 'FWC2026-Expanded', sans-serif; font-size: 18px; color: #fff; margin: 0 12px; min-width: 45px; text-align: center; }

        /* Groups Widget */
        .groups-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; max-height: 400px; overflow-y: auto; padding-right: 8px; padding-bottom: 10px; }
        .group-table-container { border-radius: 16px; overflow: hidden; background-image: var(--bg-image); background-size: cover; background-position: center; border: 1px solid rgba(255, 255, 255, 0.1); }
        .group-table-overlay { background: rgba(19, 19, 20, 0.9); backdrop-filter: blur(8px); padding: 18px; width: 100%; height: 100%; }
        .group-table-header { font-family: 'FWC2026-Expanded', 'Arial Black', sans-serif; color: #d4b561; font-size: 15px; text-align: center; margin-bottom: 12px; border-bottom: 1px solid rgba(212, 181, 97, 0.3); padding-bottom: 8px; }
        .group-table { width: 100%; border-collapse: collapse; font-family: 'FWC2026-Condensed', sans-serif; font-size: 14px; }
        .group-table th { text-align: center; padding: 10px 4px; color: #a8a8a8; font-weight: 600; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .group-table th:nth-child(2) { text-align: left; }
        .group-table td { text-align: center; padding: 10px 4px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); color: #fff; }
        .group-table td:nth-child(2) { text-align: left; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .group-table tr.qualified td:first-child, .group-table tr.qualified td:nth-child(2) { color: var(--secondary); font-weight: bold; }

        /* Lineups Widget */
        #lineups-widget { background-image: var(--bg-image); background-size: cover; background-position: center; border: 1px solid rgba(255, 255, 255, 0.1); overflow: hidden; }
        .lineups-overlay { background: rgba(19, 19, 20, 0.9); backdrop-filter: blur(10px); padding: 24px; width: 100%; height: 100%; display: flex; flex-direction: column; }
        .lineups-title { font-family: 'FWC2026-Expanded', 'Arial Black', sans-serif; color: #fff; text-align: center; margin-bottom: 20px; font-size: 16px; }
        .lineups-columns { display: flex; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
        .lineup-team { flex: 1; min-width: 220px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 16px; }
        .lineup-team-header { font-family: 'FWC2026-Expanded', 'Arial Black', sans-serif; color: #d4b561; font-size: 14px; text-align: center; margin-bottom: 12px; border-bottom: 1px solid rgba(212, 181, 97, 0.3); padding-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .lineup-team-header img { width: 28px; height: 18px; border-radius: 3px; object-fit: cover; }
        .lineup-list { list-style: none; padding: 0; margin: 0; max-height: 280px; overflow-y: auto; }
        .lineup-player { font-family: 'FWC2026-Condensed', 'Arial Black', sans-serif; font-size: 14.5px; color: white; padding: 6px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.03); display: flex; align-items: center; gap: 10px; }
        .player-number { font-weight: bold; color: var(--secondary); min-width: 22px; }

        /* Media Containers */
        .yt-container-wrapper, .maps-container-wrapper { margin-top: 16px; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); position: relative; width: 100%; aspect-ratio: 16 / 9; }
        .yt-container-wrapper { background: #000; }
        .maps-container-wrapper { margin: 10px 0; max-height: 350px; }

        .modal-body { padding: 20px; max-height: 75vh; overflow-y: auto; }

        /* ==========================================================================
           RESPONSIVIDADE (4 TELAS: DESKTOP, LAPTOP, TABLET, CELULAR)
           ========================================================================== */

        /* 1. DESKTOP (> 1200px): Padrão já definido acima (Chat largo ao centro, Feed fixo lateral) */

        /* 2. LAPTOP E TELAS MÉDIAS (Até 1200px) */
        @media (max-width: 1200px) {
            .chat-section { max-width: 65%; } /* Reduz o chat para o feed não esmagar a interface */
            .live-feed-section { min-width: 280px; max-width: 320px; }

        }

        /* 3. TABLET (Até 900px): O feed vira um menu lateral expansível (gaveta) */
        @media (max-width: 900px) {
            .chat-section { max-width: 100%; }
            .chat-input-container { max-width: 95%; }
            
            .live-feed-section { 
                position: absolute; top: 0; right: 0; height: 100%; width: 340px; 
                transform: translateX(100%); z-index: 200; padding-top: 65px; 
                background: rgba(19, 19, 20, 0.95);

            header { position: relative; z-index: 300; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); }
            
            .groups-grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        }

        /* 4. CELULAR E TELAS PEQUENAS (Até 600px): Componentes compactados */
        @media (max-width: 600px) {

            /* Ajustes Finos do Placar ESPN */
            .placar-main { padding: 5px 0; flex-direction: row; justify-content: center; gap: 5px; }
            .time-card { width: auto; max-width: 80px; padding: 0; height: 40px; flex-direction: column; justify-content: center; gap: 2px; }

        async function selecionarJogo(gameId, avisarChat = true) {
            currentGameId = gameId;
            const game = outrosJogosList.find(g => g.id === gameId);
            if (!game) return;

            const comp = game.competitions[0];
            const home = comp.competitors.find(c => c.homeAway === 'home');
            const away = comp.competitors.find(c => c.homeAway === 'away');

            if (home && away) {
                timeCasa = { sigla: home.team.abbreviation || 'CASA', logo: home.team.logo, nome: home.team.displayName };
                timeFora = { sigla: away.team.abbreviation || 'FORA', logo: away.team.logo, nome: away.team.displayName };

                if (document.getElementById('home-logo')) document.getElementById('home-logo').src = timeCasa.logo;
                if (document.getElementById('home-abbrev')) document.getElementById('home-abbrev').innerText = timeCasa.sigla;
                if (document.getElementById('score-home')) document.getElementById('score-home').innerText = home.score || "0";

                if (document.getElementById('away-logo')) document.getElementById('away-logo').src = timeFora.logo;
                if (document.getElementById('away-abbrev')) document.getElementById('away-abbrev').innerText = timeFora.sigla;
                if (document.getElementById('score-away')) document.getElementById('score-away').innerText = away.score || "0";

                const dateObj = new Date(game.date);
                if (document.getElementById('placar-date')) {
                    document.getElementById('placar-date').innerText = `${dateObj.toLocaleDateString('pt-BR')} às ${dateObj.getHours().toString().padStart(2, '0')}:${dateObj.getMinutes().toString().padStart(2, '0')}`;
                }

                let broadcastsStr = "A Definir";
                if (comp.broadcasts && comp.broadcasts.length > 0) {
                    let names = [];
                    comp.broadcasts.forEach(b => { if (b.names) names.push(...b.names); });
                    if (names.length > 0) broadcastsStr = names.join(', ');
                }
                currentBroadcast = broadcastsStr;
                if (document.getElementById('placar-broadcast')) document.getElementById('placar-broadcast').innerText = broadcastsStr;

                const clockEl = document.getElementById('game-clock');
                if (game.status.type.state === 'in') {
                    clockEl.innerText = game.status.displayClock || game.status.type.detail;
                    clockEl.style.color = "white";
                } else if (game.status.type.state === 'post') {
                    clockEl.innerText = "FIM";
                    clockEl.style.color = "#10b981";
                } else {
                    const dataJogo = new Date(game.date);
                    clockEl.innerText = `${dataJogo.getHours().toString().padStart(2, '0')}:${dataJogo.getMinutes().toString().padStart(2, '0')}`;
                    clockEl.style.color = "#a8a8a8";
                }
            }

            document.querySelectorAll('.match-item').forEach(el => el.classList.remove('selected'));
            const selectedItem = document.getElementById(`match-${gameId}`);
            if (selectedItem) selectedItem.classList.add('selected');

            try {
                if (gameId.startsWith('mock-')) {
                    gerarLineupsMock();
                } else {
                    const summaryUrl = `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=${gameId}`;
                    const summaryRes = await fetch(summaryUrl);
                    const summaryData = await summaryRes.json();
                    if (summaryData.rosters) preencherLineups(summaryData.rosters);
                    else gerarLineupsMock();

                    if (summaryData.predictor) {
                        const probH = summaryData.predictor.homeChance ? summaryData.predictor.homeChance.toFixed(1) + "%" : "--%";
                        const probA = summaryData.predictor.awayChance ? summaryData.predictor.awayChance.toFixed(1) + "%" : "--%";
                        const probD = summaryData.predictor.tieChance ? summaryData.predictor.tieChance.toFixed(1) + "%" : "--%";
                        if (document.getElementById('prob-home')) document.getElementById('prob-home').innerText = `${timeCasa.sigla}: ${probH}`;
                        if (document.getElementById('prob-draw')) document.getElementById('prob-draw').innerText = `EMP: ${probD}`;
                        if (document.getElementById('prob-away')) document.getElementById('prob-away').innerText = `${timeFora.sigla}: ${probA}`;
                    }

                    if (summaryData.keyEvents && summaryData.keyEvents.length > 0) {
                        const lances = summaryData.keyEvents.slice(-5).reverse();
                        lances.forEach(lance => {
                            const tempo = lance.clock ? lance.clock.displayValue : '';
                            const texto = lance.text || lance.shortText;
                            adicionarNoFeedRealAPI(`**[${tempo}]** ${texto}`);
                        });
                    }
                }
            } catch (e) { gerarLineupsMock(); }

            if (avisarChat && document.getElementById('initial-greeting').style.display === 'none') {
                processarRespostaIA(`selecionei o jogo ${timeCasa.nome} x ${timeFora.nome}`);
            }
        }

            const container = document.getElementById('match-list-container');
            container.innerHTML = '';
            if (!jogos || jogos.length === 0) return;

            jogos.forEach(game => {
                const comp = game.competitions[0];
                const home = comp.competitors.find(c => c.homeAway === 'home');
                const away = comp.competitors.find(c => c.homeAway === 'away');
                if (!home || !away) return;

                const dateObj = new Date(game.date);
                const dateStr = `${dateObj.toLocaleDateString('pt-BR')} às ${dateObj.getHours().toString().padStart(2, '0')}:${dateObj.getMinutes().toString().padStart(2, '0')}`;

                let broadcastsStr = "A Definir";
                if (comp.broadcasts && comp.broadcasts.length > 0) {
                    let names = [];
                    comp.broadcasts.forEach(b => { if (b.names) names.push(...b.names); });
                    if (names.length > 0) broadcastsStr = names.join(', ');
                }

                let statusClass = 'status-scheduled';
                let statusText = dateObj.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                let scoreText = 'vs';

                if (game.status.type.state === 'in') {
                    statusClass = 'status-live';
                    statusText = game.status.displayClock || game.status.type.detail;
                    scoreText = `${home.score} - ${away.score}`;
                } else if (game.status.type.state === 'post') {
                    statusClass = 'status-finished';
                    statusText = 'FINAL';
                    scoreText = `${home.score} - ${away.score}`;
                }

                const item = document.createElement('div');
                item.className = `match-item ${game.id === currentGameId ? 'selected' : ''}`;
                item.id = `match-${game.id}`;
                item.onclick = () => selecionarJogo(game.id);

                item.innerHTML = `
                    <div class="match-info">
                        <span class="match-date">${dateStr}</span>
                        <span class="match-broadcast" style="font-size: 11px; color: #10b981; font-weight: bold;">📺 ${broadcastsStr}</span>

            function createMockMatch(id, home, away, d, h) {
                let state = 'pre';
                let detail = 'Agendado';
                let clock = '00:00';
                let scoreH = "0";
                let scoreA = "0";

                // Injetando emoção: Alguns jogos já rolaram e outros estão ao vivo!

                    state = 'post'; detail = 'Final'; scoreH = "2"; scoreA = "1";

                    state = 'in'; detail = 'Ao Vivo'; clock = '62:00'; scoreH = "2"; scoreA = "0";

                        mocks.push(createMockMatch(matchId++, t[gIdx], t[gIdx+2], day, hour)); incrementTime();

                        mocks.push(createMockMatch(matchId++, t[gIdx], t[gIdx+3], day, hour)); incrementTime();
                        mocks.push(createMockMatch(matchId++, t[gIdx+1], t[gIdx+2], day, hour)); incrementTime();

                if (detail.includes('+') || clock.includes('+')) {
                    isStoppageTime = true;
                    const match = detail.match(/\+\s*\d+/) || clock.match(/\+\s*\d+/);
                    if (match) addedTimeText = match[0];
                } else {
                    let min = parseInt(clock.split(':')[0]);
                    let period = game.status.period;
                    if ((period === 1 && min >= 45) || (period === 2 && min >= 90)) {
                        isStoppageTime = true; addedTimeText = "+Tempo Extra";
                    }
                }
            }

            let stoppageHtml = isStoppageTime ? `<div class="stoppage-time-anim">${addedTimeText} ACRÉSCIMOS</div>` : '';
            let posseCasa = 50, posseFora = 50, chutesCasa = 0, chutesFora = 0, faltasCasa = 0, faltasFora = 0;

        async function fetchWebSearchResults(query) {
            if (!serpApiKey) return `**[ERRO]** Chave SerpApi ausente. Adicione-a nas configurações.`;
            let engine = 'google';
            const qLower = query.toLowerCase();
            const mapKeywords = ['mapa', 'onde fica', 'endereço', 'localização', 'perto de'];
            const ytKeywords = ['youtube', 'vídeo', 'video', 'assistir', 'canal do'];
            if (mapKeywords.some(k => qLower.includes(k))) engine = 'google_maps';
            else if (ytKeywords.some(k => qLower.includes(k))) engine = 'youtube';

            let endpoint = `https://serpapi.com/search.json?api_key=${serpApiKey}&engine=${engine}&gl=br&hl=pt-br`;
            if (engine === 'google_maps') endpoint += `&q=${encodeURIComponent(query)}&type=search`;
            else if (engine === 'youtube') {
                let yQuery = query;
                if (qLower.includes('ao vivo') || qLower.includes('cazé') || qLower.includes('cazetv') || qLower.includes('transmissão')) {
                    yQuery += ' https://www.youtube.com/@CazeTV/streams';
                }
                endpoint += `&search_query=${encodeURIComponent(yQuery)}`;
            }
            else endpoint += `&q=${encodeURIComponent(query)}`;

            try {
                let response = await fetch(`https://corsproxy.io/?${encodeURIComponent(endpoint)}`);
                if (!response.ok) throw new Error("Erro no proxy SerpApi");
                let results = await response.json();

                if (results.error && engine !== 'google') {
                    engine = 'google';
                    response = await fetch(`https://corsproxy.io/?${encodeURIComponent(`https://serpapi.com/search.json?q=${encodeURIComponent(query)}&api_key=${serpApiKey}&engine=${engine}&gl=br&hl=pt-br`)}`);
                    results = await response.json();
                }

                let context = ``;
                if (engine === 'youtube' && (results.video_results || results.shorts_results)) {
                    context += `### Vídeos Encontrados (YouTube):\n\n`;
                    let allVideos = results.video_results || [];
                    let officialVideos = allVideos.filter(vid => vid.channel && vid.channel.name && vid.channel.name.toLowerCase().includes('caze'));
                    let videosToRender = officialVideos.length > 0 ? officialVideos : allVideos;
                    videosToRender.slice(0, 3).forEach((vid, i) => {
                        let videoId = vid.video_id || (vid.link && vid.link.match(/(?:v=|\/shorts\/|youtu\.be\/)([^&?]+)/)?.[1]);
                        if (videoId && i === 0) context += `[YOUTUBE_EMBED]${videoId}[/YOUTUBE_EMBED]\n`;
                        context += `**${i + 1}. ${vid.title}** (Canal: ${vid.channel?.name || 'Desconhecido'})\n`;
                    });
                    return context;
                }
                if (engine === 'google_maps' && results.local_results && results.local_results.length > 0) {
                    context += `### Locais Encontrados (Google Maps):\n\n`;
                    const mapQuery = encodeURIComponent(`${results.local_results[0].title} ${results.local_results[0].address || ''}`);
                    context += `[MAPS_EMBED]${mapQuery}[/MAPS_EMBED]\n\n`;
                    results.local_results.slice(0, 3).forEach((place, i) => { context += `**${i + 1}. ${place.title}**\n📍 ${place.address || ''}\n\n`; });
                    return context;
                }
                if (results.organic_results?.length > 0) {
                    context += `### Resultados da Web:\n`;
                    results.organic_results.slice(0, 3).forEach((r, i) => { context += `**${i + 1}. ${r.title}**\n${r.snippet}\nLer mais\n\n`; });
                }
                return context || "Sem resultados encontrados na web.";
            } catch (error) { return `Falha ao aceder à Web no momento. Resposta baseada no conhecimento local.`; }
        }

        async function fetchAIGroq(promptText) {
            if (!groqApiKey) return "Chave API Groq não configurada.";
            try {
                const res = await fetch(`https://api.groq.com/openai/v1/chat/completions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${groqApiKey}` },
                    body: JSON.stringify({
                        model: currentModelId,
                        messages: [
                            {
                                role: 'system',
                                content: `Você é o resenIA, assistente de inteligência artificial definitivo especializado na Copa do Mundo. Seu tom deve ser o de um analista apaixonado por futebol. Formatação em markdown.`
                            },
                            { role: 'user', content: promptText }
                        ]
                    })
                });
                if (!res.ok) throw new Error("Erro na API da Groq");
                const data = await res.json();
                return data.choices[0].message.content;
            } catch (error) {
                return "Opa, deu um impedimento na minha conexão cerebral com a IA! Tenta de novo, torcedor.";
            }
        }

        function appendMessage(sender, text) {

            } else {
                formattedText = text
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" style="color: #d4b561; text-decoration: none; font-weight: bold; margin-top: 8px; display: inline-block;">$1</a>')
                    .replace(/\n/g, '<br>');

            const ytOrigin = (window.location.protocol === 'file:' || !window.location.hostname) ? 'http://localhost' : window.location.origin;

            formattedText = formattedText
                .replace(/\[YOUTUBE_EMBED\](.*?)\[\/YOUTUBE_EMBED\]/g, '<div class="yt-container-wrapper" style="margin-bottom:8px;"><iframe src="https://www.youtube.com/embed/$1?origin=' + ytOrigin + '" allowfullscreen></iframe></div><a href="https://www.youtube.com/watch?v=$1" target="_blank" style="color: #d4b561; font-size: 12px; font-weight: bold; text-decoration: none; display: inline-flex; align-items: center; gap: 5px;">🔗 Assistir direto no YouTube (Caso esteja bloqueado)</a>')
                .replace(/\[MAPS_EMBED\](.*?)\[\/MAPS_EMBED\]/g, '<div class="maps-container-wrapper"><iframe scrolling="no" src="https://maps.google.com/maps?q=$1&t=&z=15&ie=UTF8&iwloc=&output=embed"></iframe></div>');

            if (sender === 'ai') div.innerHTML = `<strong>ResenIA</strong><br>${formattedText}`;
            else div.innerHTML = formattedText;
            chatBox.appendChild(div);

            setTimeout(() => { chatBox.scrollTop = chatBox.scrollHeight; }, 100);

                            }
                        } else {
                            if (playerYouTube && typeof playerYouTube.destroy === 'function') { playerYouTube.destroy(); playerYouTube = null; }
                            const wrapper = document.querySelector('.live-feed-section .yt-container-wrapper');
                            wrapper.innerHTML = "<div id='yt-player-container'><p style='color:white; padding:20px; text-align:center;'>Nenhuma transmissão ativa encontrada.<br><span style='color:#a8a8a8; font-size:13px; display:inline-block; margin-top:8px;'>Tente novamente mais tarde.</span></p></div>";
                        }
                    } else {
                        const wrapper = document.querySelector('.live-feed-section .yt-container-wrapper');
                        wrapper.innerHTML = "<div id='yt-player-container'><p style='color:white; padding:20px; text-align:center;'>A API do YouTube ainda está carregando...<br><span style='color:#a8a8a8; font-size:13px; display:inline-block; margin-top:8px;'>Transmissão agendada em breve.</span></p></div>";
                    }
                }, 100);
            }
        }
    </script>
</body>
</html>
