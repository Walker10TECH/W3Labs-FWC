            document.querySelectorAll('.match-item').forEach(el => el.classList.remove('selected'));
            document.querySelectorAll(`#match-${gameId}`).forEach(el => el.classList.add('selected'));

            try {
                if (gameId.startsWith('mock-')) {
                    // Atualiza a interface gráfica, mas não preenche os widgets táticos a menos que seja solicitado
                } else {
                    const summaryUrl = `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=${gameId}`;
                    const summaryRes = await fetch(summaryUrl);
                    const summaryData = await summaryRes.json();

                    if (summaryData.predictor) {
                        const probH = summaryData.predictor.homeChance ? summaryData.predictor.homeChance.toFixed(1) + "%" : "--%";
                        const probA = summaryData.predictor.awayChance ? summaryData.predictor.awayChance.toFixed(1) + "%" : "--%";

            if (avisarChat && document.getElementById('initial-greeting').style.display === 'none') {
                processarRespostaIA(`selecionei o jogo ${timeCasa.nome} x ${timeFora.nome}`);

        function atualizarRelogio() {
            outrosJogosList.forEach(game => {
                if (game.status.type.state === 'in') {
                    if (game.relogioMin === undefined) {
                        let clockStr = game.status.displayClock || game.status.type.detail || "00:00";
                        let match = clockStr.match(/(\d+)[:']?(\d+)?/);
                        game.relogioMin = match ? parseInt(match[1]) || 0 : 0;
                        game.relogioSeg = match && match[2] ? parseInt(match[2]) : 0;
                        game.acrescimoDefinido = Math.floor(Math.random() * 5) + 3;
                    }

                    game.relogioSeg++;
                    if (game.relogioSeg >= 60) { game.relogioSeg = 0; game.relogioMin++; }

                    let minFormat = game.relogioMin.toString().padStart(2, '0');
                    let segFormat = game.relogioSeg.toString().padStart(2, '0');
                    let displayStr = `${minFormat}:${segFormat}`;
                    let stoppageStr = "";

                    if (game.relogioMin >= 90) {
                        let extraMin = game.relogioMin - 90;
                        let maxAcrescimo = game.acrescimoDefinido || 5;

                        if (extraMin >= maxAcrescimo && game.relogioSeg === 0) {
                            game.status.type.state = 'post';
                            game.status.type.detail = 'FIM';
                            game.status.displayClock = 'FIM';

                            if (game.id === currentGameId) {
                                document.querySelectorAll('.game-clock-placar').forEach(el => el.innerText = 'FIM');
                                document.querySelectorAll('.stoppage-time-placar').forEach(el => el.style.display = 'none');
                            }
                            if (activeMatchListContainer) renderizarListaDeJogos(outrosJogosList, activeMatchListContainer);
                            return;
                        }

                        let extraMinFormat = extraMin.toString();
                        stoppageStr = `+${extraMinFormat}:${segFormat}`;
                        displayStr = `90:00`;
                        game.status.displayClock = `${displayStr} ${stoppageStr}`;
                    } else {
                        game.status.displayClock = displayStr;
                    }

                    if (game.id === currentGameId) {
                        document.querySelectorAll('.game-clock-placar').forEach(el => el.innerText = displayStr);
                        document.querySelectorAll('.stoppage-time-placar').forEach(el => {
                            if (stoppageStr) {
                                el.innerText = stoppageStr;
                                el.style.display = 'inline-block';
                            } else {
                                el.style.display = 'none';
                            }
                        });
                    }
                }
            });
        }

        async function fetchWebSearchResults(query) {
            if (!serpApiKey) return `**[ERRO]** Chave SerpApi ausente. Adicione-a nas configurações.`;
            let engine = 'google';
            const qLower = query.toLowerCase();
            const mapKeywords = ['mapa', 'onde fica', 'endereço', 'localização', 'perto de'];
            const ytKeywords = ['youtube', 'vídeo', 'video', 'assistir', 'canal do'];
            if (mapKeywords.some(k => qLower.includes(k))) engine = 'google_maps';
            else if (ytKeywords.some(k => qLower.includes(k))) engine = 'youtube';

            let endpoint = `https://serpapi.com/search.json?api_key=${serpApiKey}&engine=${engine}&gl=br&hl=pt-br&location=Brazil`;
            if (engine === 'google_maps') endpoint += `&q=${encodeURIComponent(query)}&type=search`;
            else if (engine === 'youtube') {
                let yQuery = query;
                if (qLower.includes('cazé') || qLower.includes('cazetv')) {
                    yQuery += ' CazéTV';
                } else if (qLower.includes('getv') || qLower.includes('globo') || qLower.includes('sportv')) {
                    yQuery += ' ge globo sportv';
                }

                if (!yQuery.toLowerCase().includes('brasil')) {
                    yQuery += ' Brasil';
                }

                endpoint += `&search_query=${encodeURIComponent(yQuery)}`;

                if (qLower.includes('ao vivo') || qLower.includes('live') || qLower.includes('transmissão')) {
                    endpoint += `&sp=EgJAAQ%3D%3D`;
                }
            }
            else endpoint += `&q=${encodeURIComponent(query)}`;

            const fetchWithProxy = async (targetUrl) => {
                const proxies = [
                    { url: `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`, type: 'direct' },
                    { url: `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`, type: 'json' }
                ];
                for (let proxy of proxies) {
                    try {
                        let res = await fetch(proxy.url);
                        if (res.ok) {
                            if (proxy.type === 'json') {
                                let data = await res.json();
                                if (data.contents) return JSON.parse(data.contents);
                            } else return await res.json();
                        }
                    } catch (e) { continue; }
                }
                throw new Error("Falha em todos os proxies.");
            };

            try {
                let results = await fetchWithProxy(endpoint);

                if (results.error && engine !== 'google') {
                    engine = 'google';
                    const fallbackEndpoint = `https://serpapi.com/search.json?q=${encodeURIComponent(query)}&api_key=${serpApiKey}&engine=${engine}&gl=br&hl=pt-br&location=Brazil`;
                    results = await fetchWithProxy(fallbackEndpoint);
                }

                let context = ``;

                let videos = results?.video_results || results?.inline_videos || results?.shorts_results;
                if (videos && videos.length > 0) {
                    context += `### Vídeos Encontrados (YouTube):\n\n`;
                    let officialVideos = videos.filter(vid => vid.channel && vid.channel.name && vid.channel.name.toLowerCase().includes('caze'));
                    let videosToRender = officialVideos.length > 0 ? officialVideos : videos;
                    videosToRender.slice(0, 3).forEach((vid, i) => {
                        let videoId = vid.video_id || (vid.link && vid.link.match(/(?:v=|\/shorts\/|youtu\.be\/)([^&?]+)/)?.[1]);
                        if (videoId && i === 0) context += `[YOUTUBE_EMBED]${videoId}[/YOUTUBE_EMBED]\n`;

                        let thumbUrl = videoId ? `https://img.youtube.com/vi/${videoId}/mqdefault.jpg` : (vid.thumbnail?.static || vid.thumbnail);
                        let thumbImg = thumbUrl ? `<br><a href="${vid.link || 'https://www.youtube.com/watch?v=' + videoId}" target="_blank"><img src="${thumbUrl}" style="width: 180px; border-radius: 8px; margin-top: 8px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.1); object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.5);"></a>` : '';
                        context += `**${i + 1}. ${vid.title}** (Canal: ${vid.channel?.name || 'Desconhecido'})${thumbImg}\n\n`;
                    });

                    if (engine === 'youtube') return context;
                }
                if (engine === 'google_maps' && results.local_results && results.local_results.length > 0) {
                    context += `### Locais Encontrados (Google Maps):\n\n`;
                    const mapQuery = encodeURIComponent(`${results.local_results[0].title} ${results.local_results[0].address || ''}`);
                    context += `[MAPS_EMBED]${mapQuery}[/MAPS_EMBED]\n\n`;
                    results.local_results.slice(0, 3).forEach((place, i) => { context += `**${i + 1}. ${place.title}**\n📍 ${place.address || ''}\n\n`; });
                    return context;
                }
                if (results.organic_results?.length > 0) {
                    context += `### Resultados da Web:\n`;
                    results.organic_results.slice(0, 3).forEach((r, i) => { context += `**${i + 1}. ${r.title}**\n${r.snippet}\nLer mais\n\n`; });
                }
                return context || "Sem resultados encontrados na web.";
            } catch (error) { return `Falha ao aceder à Web no momento. Resposta baseada no conhecimento local.`; }
        }

        async function fetchAIGroq(promptText) {
            if (!groqApiKey) return "Chave API Groq não configurada. A resenha depende dela!";
            try {
                const res = await fetch(`https://api.groq.com/openai/v1/chat/completions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${groqApiKey}` },
                    body: JSON.stringify({
                        model: currentModelId,
                        messages: [
                            {
                                role: 'system',
                                content: `Você é o resenIA, assistente de inteligência artificial definitivo especializado na Copa do Mundo. Seu tom deve ser o de um analista apaixonado por futebol. Formatação em markdown.`
                            },
                            { role: 'user', content: promptText }
                        ]
                    })
                });
                if (!res.ok) throw new Error("Erro na API da Groq");
                const data = await res.json();
                return data.choices[0].message.content;
            } catch (error) {
                return "Opa, deu um impedimento na minha conexão cerebral com a IA! Tenta de novo, torcedor.";
            }
        }

        async function enviarMensagem() {
            const text = inputField.value.trim();

            const initialGreeting = document.getElementById('initial-greeting');
            if (initialGreeting) initialGreeting.style.opacity = '0';

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender === 'user' ? 'msg-user' : 'msg-ai'}`;

            let formattedText = text;
            if (sender === 'ai' && typeof marked !== 'undefined') {
                formattedText = marked.parse(text);
            } else {
                formattedText = text
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" style="color: #d4b561; text-decoration: none; font-weight: bold; margin-top: 8px; display: inline-block;">$1</a>')
                    .replace(/\n/g, '<br>');
            }

            const ytOrigin = (window.location.protocol === 'file:' || !window.location.hostname) ? 'http://localhost' : window.location.origin;

            formattedText = formattedText
                .replace(/\[YOUTUBE_EMBED\](.*?)\[\/YOUTUBE_EMBED\]/g, '<div class="yt-container-wrapper" style="margin-bottom:8px;"><iframe src="https://www.youtube.com/embed/$1?origin=' + ytOrigin + '" allowfullscreen></iframe></div><a href="https://www.youtube.com/watch?v=$1" target="_blank" style="color: #d4b561; font-size: 12px; font-weight: bold; text-decoration: none; display: inline-flex; align-items: center; gap: 5px;">🔗 Assistir direto no YouTube (Caso esteja bloqueado)</a>')
                .replace(/\[MAPS_EMBED\](.*?)\[\/MAPS_EMBED\]/g, '<div class="maps-container-wrapper"><iframe scrolling="no" src="https://maps.google.com/maps?q=$1&t=&z=15&ie=UTF8&iwloc=&output=embed"></iframe></div>');

            if (sender === 'ai') div.innerHTML = `<strong>ResenIA</strong><br>${formattedText}`;
            else div.innerHTML = formattedText;
            chatBox.appendChild(div);

            setTimeout(() => { chatBox.scrollTop = chatBox.scrollHeight; }, 100);
            return div;
        }

                    const playerName = match[1].trim();
                    const bio = await buscarInfoJogador(playerName);
                    resposta = `**GOOOL!** ⚽ É caixa! Telemetria detectou gol de **${playerName}** para **${timeFora.nome}**.\n\n${bio}`;
                } else {
                    resposta = `**GOOOL!** ⚽ É caixa! Telemetria detectou gol para **${timeFora.nome}**.\n💡 *Dica: Diga "Gol do [nome do jogador]" para eu puxar o histórico da carreira dele.*`;
                }
            }
            else {
                const query = inputText + (inputText.includes("copa") ? "" : " Copa do Mundo 2026");
                const webResults = await fetchWebSearchResults(query);
                const promptIA = `O torcedor perguntou: "${inputText}"\n\nDados da Web:\n${webResults}\n\nResponda usando APENAS os dados acima de forma natural. Se os dados da web contiverem tags de mídia como [YOUTUBE_EMBED]...[/YOUTUBE_EMBED] ou [MAPS_EMBED]...[/MAPS_EMBED], mantenha na resposta.`;
                resposta = await fetchAIGroq(promptIA);
            }

            const aiMessageElement = appendMessage('ai', resposta);

            // Injeção de Widgets dentro da mensagem da IA baseada em templates
            if (showMatchListWidget) {
                const template = document.getElementById('match-list-widget-template').content.cloneNode(true);
                aiMessageElement.appendChild(template);
                activeMatchListContainer = aiMessageElement.querySelector('.match-list-container');
                renderizarListaDeJogos(outrosJogosList, activeMatchListContainer);
            }

            if (showWidget) {
                const template = document.getElementById('placar-widget-template').content.cloneNode(true);
                aiMessageElement.appendChild(template);
                selecionarJogo(currentGameId, false); // Força atualização dos dados no novo widget injetado
            }

            if (showGroupsWidget) {
                const template = document.getElementById('groups-widget-template').content.cloneNode(true);
                aiMessageElement.appendChild(template);
                activeGroupsGrid = aiMessageElement.querySelector('.groups-grid');
                fetchRealStandings(); // Busca e preenche o novo grid
            }

            if (showLineupsWidget) {
                const template = document.getElementById('lineups-widget-template').content.cloneNode(true);
                aiMessageElement.appendChild(template);
                const widgetEl = aiMessageElement.querySelector('.lineups-widget');

                try {
                    if (currentGameId && !currentGameId.startsWith('mock-')) {
                        const summaryUrl = `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=${currentGameId}`;
                        fetch(summaryUrl).then(res => res.json()).then(data => {
                            if (data.rosters) preencherLineups(data.rosters, widgetEl);
                            else gerarLineupsMock(widgetEl);
                        }).catch(() => gerarLineupsMock(widgetEl));
                    } else {
                        gerarLineupsMock(widgetEl);
                    }
                } catch (e) { gerarLineupsMock(widgetEl); }
            }

            if (showTransmissaoWidget) {
                const template = document.getElementById('transmissao-widget-template').content.cloneNode(true);
                aiMessageElement.appendChild(template);
            }

            chatBox.scrollTop = chatBox.scrollHeight;

            if (initYouTube) {
                setTimeout(() => {
                    const activeTransmissaoWidget = aiMessageElement.querySelector('.transmissao-widget');
                    if (!activeTransmissaoWidget) return;

                    if (isYouTubeReady) {
                        if (dynamicVideoId) {
                            const ytContainer = activeTransmissaoWidget.querySelector('.yt-player-container');

                            // Cria ID único para o container do YouTube no DOM
                            const uniqueYtId = 'yt-player-' + Date.now();
                            ytContainer.id = uniqueYtId;

                            const ytOrigin = (window.location.protocol === 'file:' || !window.location.hostname) ? 'http://localhost' : window.location.origin;

                            playerYouTube = new YT.Player(uniqueYtId, {
                                height: '100%', width: '100%', videoId: dynamicVideoId,
                                playerVars: { 'autoplay': 0, 'controls': 1, 'rel': 0, 'modestbranding': 1, 'origin': ytOrigin, 'enablejsapi': 1 },
                                events: {
                                    'onError': function (event) {
                                        if (event.data === 101 || event.data === 150) {
                                            activeTransmissaoWidget.querySelector('.yt-container-wrapper').innerHTML = `<div style='display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; padding:20px; text-align:center; background:#000;'><p style='color:#ff4d4d; font-weight:bold; margin-bottom:10px; font-size:14px;'>Reprodução Bloqueada</p><p style='color:#a8a8a8; font-size:11px; margin-bottom:15px;'>O dono do vídeo desativou a reprodução fora do YouTube.</p><a href='https://www.youtube.com/watch?v=${dynamicVideoId}' target='_blank' style='background:#d4b561; color:#000; padding:6px 14px; border-radius:12px; font-weight:bold; text-decoration:none; font-size:11px;'>ASSISTIR DIRETAMENTE NO YOUTUBE</a></div>`;
                                        }
                                    }
                                }
                            });
                        } else {
                            activeTransmissaoWidget.querySelector('.yt-container-wrapper').innerHTML = "<div style='display:flex; align-items:center; justify-content:center; height:100%;'><p style='color:white; padding:20px; text-align:center;'>Nenhuma transmissão ativa encontrada.<br><span style='color:#a8a8a8; font-size:13px; display:inline-block; margin-top:8px;'>Tente novamente mais tarde.</span></p></div>";
                        }
                    } else {
                        activeTransmissaoWidget.querySelector('.yt-container-wrapper').innerHTML = "<div style='display:flex; align-items:center; justify-content:center; height:100%;'><p style='color:white; padding:20px; text-align:center;'>A API do YouTube ainda está carregando...<br><span style='color:#a8a8a8; font-size:13px; display:inline-block; margin-top:8px;'>Transmissão agendada em breve.</span></p></div>";
                    }
                }, 200);
            }
        }
    </script>
</body>

</html>
